name = "miagobble/bezier"
version = "1.1.0"
description = "A utility module for working with Bezier curves."
license = "MIT"
authors = ["Mia Gobble (https://praxis.igottic.com/)"]
repository = "https://github.com/MiaGobble/Praxis"

includes = ["pesde.toml", "init.luau"]

[target]
environment = "roblox"
lib = "init.luau"
build_files = ["init.luau"]

[indices]
default = "https://github.com/pesde-pkg/index"

[dependencies]
ValuePacker = { workspace = "miagobble/value_packer", version = "^" }

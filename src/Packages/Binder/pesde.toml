name = "miagobble/binder"
version = "1.0.0"
description = "Binds OOP classes to Roblox instances through CollectionService tags."
license = "MIT"
authors = ["Mia Gobble (https://praxis.igottic.com/)"]
repository = "https://github.com/MiaGobble/Praxis"

includes = ["pesde.toml", "init.luau"]

[target]
environment = "roblox"
lib = "init.luau"
build_files = ["init.luau"]

[indices]
default = "https://github.com/pesde-pkg/index"

[dependencies]
Signal = { workspace = "miagobble/signal", version = "^" }
Bucket = { workspace = "miagobble/bucket", version = "^" }
TagUtils = { workspace = "miagobble/tag_utils", version = "^" }

name = "miagobble/data_store"
version = "1.0.1"
description = "Wrapper utilities around Roblox DataStoreService with retry support and ser/des for any type."
license = "MIT"
authors = ["Mia Gobble (https://praxis.igottic.com/)"]
repository = "https://github.com/MiaGobble/Praxis"

includes = ["pesde.toml", "init.luau"]

[target]
environment = "roblox"
lib = "init.luau"
build_files = ["init.luau"]

[indices]
default = "https://github.com/pesde-pkg/index"

name = "miagobble/dialogue_tree"
version = "1.0.0"
description = "Backend code to process dialogue trees, with built-in functionality for sessions and memory. Uses signals to communicate with the front-end."
license = "MIT"
authors = ["Mia Gobble (https://praxis.igottic.com/)"]
repository = "https://github.com/MiaGobble/Praxis"

includes = ["pesde.toml", "init.luau"]

[target]
environment = "roblox"
lib = "init.luau"
build_files = ["init.luau"]

[indices]
default = "https://github.com/pesde-pkg/index"

[dependencies]
Signal = { workspace = "miagobble/signal", version = "^" }

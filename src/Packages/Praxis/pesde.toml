name = "miagobble/praxis"
version = "1.1.0"
description = "Library with utilities and more for general usage in any project."
license = "MIT"
authors = ["Mia Gobble (https://praxis.igottic.com/)"]
repository = "https://github.com/MiaGobble/Praxis"

includes = ["pesde.toml", "init.luau"]

[target]
environment = "roblox"
lib = "init.luau"
build_files = ["init.luau"]

[indices]
default = "https://github.com/pesde-pkg/index"

[dependencies]
Badges = { workspace = "miagobble/badges", version = "^" }
Bezier = { workspace = "miagobble/bezier", version = "^" }
Binder = { workspace = "miagobble/binder", version = "^" }
Bucket = { workspace = "miagobble/bucket", version = "^" }
Child = { workspace = "miagobble/child", version = "^" }
DataStore = { workspace = "miagobble/data_store", version = "^" }
DialogueTree = { workspace = "miagobble/dialogue_tree", version = "^" }
EffectPlayer = { workspace = "miagobble/effect_player", version = "^" }
Initializer = { workspace = "miagobble/initializer", version = "^" }
Input = { workspace = "miagobble/input", version = "^" }
Oklab = { workspace = "miagobble/oklab", version = "^" }
Optional = { workspace = "miagobble/optional", version = "^" }
ProgressionUtils = { workspace = "miagobble/progression_utils", version = "^" }
RateLimiter = { workspace = "miagobble/rate_limiter", version = "^" }
SeamStoryUtils = { workspace = "miagobble/seam_story_utils", version = "^" }
SerDes = { workspace = "miagobble/ser_des", version = "^" }
Signal = { workspace = "miagobble/signal", version = "^" }
Symbol = { workspace = "miagobble/symbol", version = "^" }
TagUtils = { workspace = "miagobble/tag_utils", version = "^" }
Time = { workspace = "miagobble/time", version = "^" }
TracebackUtils = { workspace = "miagobble/traceback_utils", version = "^" }
Typer = { workspace = "miagobble/typer", version = "^" }
ValuePacker = { workspace = "miagobble/value_packer", version = "^" }
Select = { workspace = "miagobble/select", version = "^" }
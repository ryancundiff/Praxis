name = "miagobble/progression_utils"
version = "1.0.4"
description = "Utilities for managing quest data and progress."
license = "MIT"
authors = ["Mia Gobble (https://praxis.igottic.com/)"]
repository = "https://github.com/MiaGobble/Praxis"

includes = ["pesde.toml", "Boosters.luau", "Inventory.luau", "Quests.luau", "Scores.luau", "Types.luau", "init.luau"]

[target]
environment = "roblox"
lib = "init.luau"
build_files = ["Boosters.luau", "Inventory.luau", "Quests.luau", "Scores.luau", "Types.luau", "init.luau"]

[indices]
default = "https://github.com/pesde-pkg/index"

[dependencies]
Signal = { workspace = "miagobble/signal", version = "^" }
Symbol = { workspace = "miagobble/symbol", version = "^" }
Typer = { workspace = "miagobble/typer", version = "^" }
Bucket = { workspace = "miagobble/bucket", version = "^" }

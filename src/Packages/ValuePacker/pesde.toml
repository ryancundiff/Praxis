name = "miagobble/value_packer"
version = "1.0.0"
description = "Unpacks and packs values of various types into a table of numbers."
license = "MIT"
authors = ["Mia Gobble (https://praxis.igottic.com/)"]
repository = "https://github.com/MiaGobble/Praxis"

includes = ["pesde.toml", "init.luau"]

[target]
environment = "roblox"
lib = "init.luau"
build_files = ["init.luau"]

[indices]
default = "https://github.com/pesde-pkg/index"

[dependencies]
Oklab = { workspace = "miagobble/oklab", version = "^" }
